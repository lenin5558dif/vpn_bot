<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPN Admin Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #05060a;
      --card: rgba(12, 14, 24, 0.7);
      --border: rgba(255,255,255,0.07);
      --accent: #5ef0ff;
      --accent-2: #d87bff;
      --text: #e8ecf5;
      --muted: #9ba3b5;
      --danger: #ff6b6b;
      --success: #7cf4c6;
      --warning: #ffd166;
      --radius: 18px;
      --shadow: 0 10px 60px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(94,240,255,0.08), transparent 32%),
        radial-gradient(circle at 80% 0%, rgba(216,123,255,0.10), transparent 28%),
        linear-gradient(145deg, #05060a 0%, #0a0f1c 50%, #05060a 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    header {
      padding: 20px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      background: rgba(5,6,10,0.6);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }
    .title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .title::before {
      content: "";
      width: 12px; height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, #0af 80%);
      box-shadow: 0 0 20px var(--accent);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(120deg, rgba(94,240,255,0.14), rgba(216,123,255,0.14));
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 14px;
      box-shadow: var(--shadow);
    }
    .container {
      width: min(1200px, 95vw);
      margin: 0 auto 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      flex: 1;
    }
    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .card h3 {
      margin: 0 0 10px;
      font-size: 15px;
      letter-spacing: 0.3px;
      color: var(--muted);
      text-transform: uppercase;
    }
    label { display: block; margin: 10px 0 6px; font-size: 13px; color: var(--muted); }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 14px;
      transition: border 120ms ease, box-shadow 120ms ease;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(94,240,255,0.1);
    }
    button {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 600;
      color: #05060a;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 10px 30px rgba(94,240,255,0.25);
    }
    button.secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      box-shadow: none;
    }
    button.danger { background: var(--danger); color: #05060a; box-shadow: 0 10px 25px rgba(255,107,107,0.25); }
    button:hover { transform: translateY(-1px) scale(1.01); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .list { display: flex; flex-direction: column; gap: 12px; }
    .item {
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.02);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .tag {
      display: inline-flex;
      padding: 5px 9px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
    }
    .tag.success { background: rgba(124, 244, 198, 0.12); color: var(--success); }
    .tag.warn { background: rgba(255, 209, 102, 0.12); color: var(--warning); }
    .tag.danger { background: rgba(255, 107, 107, 0.12); color: var(--danger); }
    .small { font-size: 13px; color: var(--muted); }
    .link { color: var(--accent); text-decoration: none; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    .metric {
      padding: 12px;
      background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border-radius: 14px;
      border: 1px solid var(--border);
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .activity-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
    }
    @media (max-width: 900px) {
      .activity-grid { grid-template-columns: 1fr; }
    }
    .events {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
    }
    .event {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 10px;
      align-items: center;
    }
    .event .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }
    .event .dot.warn { background: var(--warning); box-shadow: 0 0 12px var(--warning); }
    .event .dot.danger { background: var(--danger); box-shadow: 0 0 12px var(--danger); }
    .event-time { color: var(--muted); font-size: 12px; }
    .spark {
      width: 100%;
      height: 60px;
    }
    .pill-toggle {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill-toggle button {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      box-shadow: none;
    }
    .pill-toggle button.active {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #05060a;
      box-shadow: 0 10px 25px rgba(94,240,255,0.25);
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="title">VPN Admin Console</div>
      <div class="pill" id="status-pill">Offline</div>
    </div>
  </header>
  <div class="container">
    <div class="layout">
      <div class="card">
        <h3>Connect</h3>
        <label>Backend URL</label>
        <input id="backend-url" value="" />
        <label>Admin username</label>
        <input id="admin-user" placeholder="admin@example.com" />
        <label>Admin password</label>
        <input id="admin-pass" type="password" />
        <div class="actions" style="margin-top:12px;">
          <button id="btn-login">Login</button>
          <button class="secondary" id="btn-health">Health</button>
        </div>
        <div id="info" class="small" style="margin-top:10px;"></div>
      </div>
      <div class="card">
        <h3>Metrics</h3>
        <div class="kpi-grid">
          <div class="metric">
            <div class="small">Активных пиров</div>
            <div id="m-active" style="font-size:24px;font-weight:700;">-</div>
          </div>
          <div class="metric">
            <div class="small">Новых заявок</div>
            <div id="m-requests" style="font-size:24px;font-weight:700;">-</div>
          </div>
          <div class="metric">
            <div class="small">Трафик (RX)</div>
            <div id="m-rx" style="font-size:18px;font-weight:700;">-</div>
            <canvas id="spark-rx" class="spark"></canvas>
          </div>
          <div class="metric">
            <div class="small">Трафик (TX)</div>
            <div id="m-tx" style="font-size:18px;font-weight:700;">-</div>
            <canvas id="spark-tx" class="spark"></canvas>
          </div>
        </div>
        <div class="actions" style="margin-top:12px;">
          <button id="btn-requests-new">Новые заявки</button>
          <button id="btn-requests-all" class="secondary">Все заявки</button>
          <button id="btn-peers">Пиры</button>
          <button id="btn-users" class="secondary">Пользователи</button>
        </div>
        <div class="small" style="margin-top:10px;">Период для метрик и графика</div>
        <div class="pill-toggle" id="period-toggle">
          <button data-period="24">24h</button>
          <button data-period="168">7d</button>
          <button data-period="720">30d</button>
        </div>
        <div class="small" style="margin-top:10px;">Клик по действию — загрузка и вывод внизу.</div>
      </div>
    </div>
    <div class="card">
      <h3>Dashboard</h3>
      <div class="activity-grid">
        <div>
          <canvas id="trafficChart" height="200"></canvas>
        </div>
        <div>
          <div class="small" style="margin-bottom:8px;">Последние события</div>
          <div id="events" class="events"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <h3>Output</h3>
      <div id="output" class="list"></div>
    </div>
  </div>

  <script>
    const state = {
      token: null,
      backend: '',
      rangeHours: 24,
    };

    const statusPill = document.getElementById('status-pill');
    const info = document.getElementById('info');
    const output = document.getElementById('output');
    let chart;
    let sparkRxChart, sparkTxChart;
    const DESIRED_POINTS = 60;

    function setStatus(text, color='#22d3ee') {
      statusPill.textContent = text;
      statusPill.style.color = color;
    }
    function logInfo(text) { info.textContent = text; }
    function clearOutput() { output.innerHTML = ''; }

    async function api(path, options={}) {
      const url = `${state.backend}${path}`;
      const headers = options.headers || {};
      if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
      const resp = await fetch(url, { ...options, headers });
      if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
      const contentType = resp.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        return resp.json();
      }
      return resp.text();
    }

    async function login() {
      try {
        state.backend = document.getElementById('backend-url').value.trim();
        const username = document.getElementById('admin-user').value.trim();
        const password = document.getElementById('admin-pass').value;
        const form = new FormData();
        form.append('username', username);
        form.append('password', password);
        const data = await fetch(`${state.backend}/auth/login`, {
          method: 'POST',
          body: form
        }).then(r => {
          if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
          return r.json();
        });
        state.token = data.access_token;
        setStatus('Online', '#34d399');
        logInfo('Login ok');
        await loadMetrics();
      } catch (e) {
        setStatus('Auth failed', '#f87171');
        logInfo(e.message);
      }
    }

    function renderList(items, renderFn) {
      clearOutput();
      if (!items || !items.length) {
        output.innerHTML = '<div class="small">Пусто</div>';
        return;
      }
      items.forEach(renderFn);
    }

    function renderRequests(items) {
      renderList(items, req => {
        const div = document.createElement('div');
        div.className = 'item';
        const statusTag = `<span class="tag ${req.status==='new'?'warn':req.status==='approved'?'success':'danger'}">${req.status}</span>`;
        div.innerHTML = `
          <div>
            <div><strong>#${req.id}</strong> user=${req.user_id} ${statusTag}</div>
            <div class="small">Comment: ${req.comment || '-'}</div>
          </div>
          <div class="actions">
            <button data-req="${req.id}" data-act="approve">Одобрить</button>
            <button class="danger" data-req="${req.id}" data-act="reject">Отказать</button>
          </div>
        `;
        div.querySelectorAll('button').forEach(btn => {
          btn.onclick = () => updateRequest(req.id, btn.dataset.act);
        });
        output.appendChild(div);
      });
    }

    function renderPeers(items) {
      renderList(items, peer => {
        const div = document.createElement('div');
        div.className = 'item';
        const statusCls = peer.status === 'active' ? 'success' : peer.status === 'disabled' ? 'warn' : 'danger';
        div.innerHTML = `
          <div>
            <div><strong>#${peer.id}</strong> user=${peer.user_id} <a class="link" href="#" onclick="event.preventDefault()">${peer.address}</a> <span class="tag ${statusCls}">${peer.status}</span></div>
            <div class="small">Speed: ${peer.speed_limit_mbps} mbit</div>
          </div>
          <div class="actions">
            <button data-peer="${peer.id}" data-act="disabled">Отключить</button>
            <button data-peer="${peer.id}" data-act="active" class="secondary">Активировать</button>
            <button data-peer="${peer.id}" data-act="banned" class="danger">Бан</button>
          </div>
        `;
        div.querySelectorAll('button').forEach(btn => {
          btn.onclick = () => updatePeer(btn.dataset.peer, btn.dataset.act);
        });
        output.appendChild(div);
      });
    }

    function renderUsers(items) {
      renderList(items, u => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div><strong>#${u.id}</strong> ${u.name || ''}</div>
          <div class="small">Contact: ${u.contact || '-'}</div>
        `;
        output.appendChild(div);
      });
    }

    async function updateRequest(id, action) {
      if (!state.token) return logInfo('Login first');
      const status = action === 'approve' ? 'approved' : 'rejected';
      try {
        await api(`/requests/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        logInfo(`Request #${id} -> ${status}`);
      } catch (e) {
        logInfo(e.message);
      }
    }

    async function updatePeer(id, status) {
      if (!state.token) return logInfo('Login first');
      try {
        await api(`/peers/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        logInfo(`Peer #${id} -> ${status}`);
      } catch (e) {
        logInfo(e.message);
      }
    }

    document.getElementById('btn-login').onclick = login;
    document.getElementById('btn-health').onclick = async () => {
      try {
        state.backend = document.getElementById('backend-url').value.trim();
        const h = await api('/health');
        setStatus('Online', '#34d399');
        logInfo(JSON.stringify(h));
      } catch (e) {
        setStatus('Offline', '#f87171');
        logInfo(e.message);
      }
    };
    document.getElementById('btn-requests-new').onclick = async () => {
      try { renderRequests(await api('/requests?status=new')); } catch (e) { logInfo(e.message); }
    };
    document.getElementById('btn-requests-all').onclick = async () => {
      try { renderRequests(await api('/requests')); } catch (e) { logInfo(e.message); }
    };
    document.getElementById('btn-peers').onclick = async () => {
      try { renderPeers(await api('/peers')); } catch (e) { logInfo(e.message); }
    };
    document.getElementById('btn-users').onclick = async () => {
      try { renderUsers(await api('/users')); } catch (e) { logInfo(e.message); }
    };

    // Set default backend URL to same origin + /api
    (() => {
      const defaultBackend = `${window.location.origin}/api`;
      document.getElementById('backend-url').value = defaultBackend;
      state.backend = defaultBackend;
    })();

    // load metrics
    async function loadMetrics() {
      try {
        const range = state.rangeHours || 24;
        const [peers, reqsNew, trafficSummary, trafficData, audits, reqsAll] = await Promise.all([
          api('/peers'),
          api('/requests?status=new'),
          api(`/traffic/summary?hours=${range}`),
          api(`/traffic?hours=${range}`),
          api('/audit?limit=30'),
          api('/requests'),
        ]);
        const active = peers.filter(p => p.status === 'active').length;
        document.getElementById('m-active').textContent = active;
        document.getElementById('m-requests').textContent = reqsNew.length;
        const totalRx = trafficSummary.reduce((acc, t) => acc + (t.rx || 0), 0);
        const totalTx = trafficSummary.reduce((acc, t) => acc + (t.tx || 0), 0);
        const fmt = v => v > 1e9 ? (v/1e9).toFixed(2)+' GB' : v > 1e6 ? (v/1e6).toFixed(2)+' MB' : v > 1e3 ? (v/1e3).toFixed(2)+' KB' : v+' B';
        document.getElementById('m-rx').textContent = fmt(totalRx);
        document.getElementById('m-tx').textContent = fmt(totalTx);
        renderSparklines(trafficData, range);
        renderEvents(audits, reqsAll);
        await renderTrafficChart(trafficData);
      } catch (e) {
        // ignore metrics load errors
      }
    }

    function bucketTraffic(data, hours) {
      if (!data || !data.length) return { labels: [], rx: [], tx: [] };
      const rangeMs = (hours || 24) * 3600 * 1000;
      const now = Date.now();
      const start = now - rangeMs;
      const bucketMs = Math.max(60 * 1000, Math.floor(rangeMs / DESIRED_POINTS));
      const buckets = [];
      data.forEach(d => {
        const ts = new Date(d.ts).getTime();
        if (ts < start) return;
        const idx = Math.floor((ts - start) / bucketMs);
        const bucket = buckets[idx] || { rx: 0, tx: 0, ts: start + idx * bucketMs };
        bucket.rx += (d.delta_rx || 0);
        bucket.tx += (d.delta_tx || 0);
        buckets[idx] = bucket;
      });
      const labels = buckets.map(b => {
        const dt = new Date(b.ts);
        return hours > 24
          ? `${dt.getDate()}.${dt.getMonth()+1} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`
          : dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      });
      const toMB = v => v / 1_000_000;
      return {
        labels,
        rx: buckets.map(b => toMB(b?.rx || 0)),
        tx: buckets.map(b => toMB(b?.tx || 0)),
      };
    }

    async function renderTrafficChart(dataOverride) {
      if (!state.token) return;
      try {
        const range = state.rangeHours || 24;
        const data = dataOverride || await api(`/traffic?hours=${range}`);
        const { labels, rx, tx } = bucketTraffic(data, range);
        const ctx = document.getElementById('trafficChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [
              { label: 'RX (MB)', data: rx, borderColor: '#5ef0ff', backgroundColor: 'rgba(94,240,255,0.2)', fill: true, tension: 0.35, pointRadius: 2 },
              { label: 'TX (MB)', data: tx, borderColor: '#d87bff', backgroundColor: 'rgba(216,123,255,0.2)', fill: true, tension: 0.35, pointRadius: 2 },
            ],
          },
          options: {
            plugins: { legend: { labels: { color: '#e8ecf5' } } },
            scales: {
              x: { ticks: { color: '#9ba3b5', maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }, grid: { color: 'rgba(255,255,255,0.05)' } },
              y: { ticks: { color: '#9ba3b5' }, grid: { color: 'rgba(255,255,255,0.05)' } },
            }
          }
        });
      } catch (e) {
        // ignore chart errors
      }
    }

    function renderSpark(id, data, color) {
      const ctx = document.getElementById(id).getContext('2d');
      if (!ctx) return;
      const existing = id === 'spark-rx' ? sparkRxChart : sparkTxChart;
      if (existing) existing.destroy();
      const chartObj = new Chart(ctx, {
        type: 'line',
        data: { labels: data.map((_, i) => i), datasets: [{ data, borderColor: color, backgroundColor: 'transparent', tension: 0.3, pointRadius: 0 }] },
        options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } }, elements: { line: { borderWidth: 2 } } }
      });
      if (id === 'spark-rx') sparkRxChart = chartObj; else sparkTxChart = chartObj;
    }

    function renderSparklines(raw, hours) {
      const { rx, tx } = bucketTraffic(raw, hours);
      renderSpark('spark-rx', rx, '#5ef0ff');
      renderSpark('spark-tx', tx, '#d87bff');
    }

    function formatTs(ts) {
      const d = new Date(ts);
      return `${d.toLocaleDateString()} ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
    }

    function renderEvents(audits, requests) {
      const box = document.getElementById('events');
      box.innerHTML = '';
      const events = [];
      (audits || []).forEach(a => {
        let text = a.action;
        let tone = '';
        if (a.action === 'request_update') text = `Заявка #${a.target_id} → ${a.meta?.status || ''}`;
        if (a.action === 'peer_delete') { text = `Пир #${a.target_id} забанен`; tone = 'danger'; }
        if (a.action === 'peer_update') text = `Пир #${a.target_id} → ${a.meta?.status || ''}`;
        if (a.action === 'peer_create') text = `Создан пир #${a.target_id}`;
        events.push({ ts: a.ts, text, tone });
      });
      (requests || []).slice(0, 10).forEach(r => {
        events.push({
          ts: r.resolved_at || r.created_at,
          text: `Заявка #${r.id} → ${r.status}`,
          tone: r.status === 'rejected' ? 'danger' : r.status === 'approved' ? 'success' : 'warn'
        });
      });
      events.sort((a, b) => new Date(b.ts) - new Date(a.ts));
      const top = events.slice(0, 12);
      if (!top.length) {
        box.innerHTML = '<div class="small">Пока нет событий</div>';
        return;
      }
      top.forEach(ev => {
        const row = document.createElement('div');
        row.className = 'event';
        row.innerHTML = `
          <div class="dot ${ev.tone || ''}"></div>
          <div>
            <div>${ev.text}</div>
            <div class="event-time">${formatTs(ev.ts)}</div>
          </div>
        `;
        box.appendChild(row);
      });
    }

    document.getElementById('btn-login').addEventListener('click', () => setTimeout(loadMetrics, 500));

    // period toggle
    const periodToggle = document.getElementById('period-toggle');
    periodToggle.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        periodToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.rangeHours = parseInt(btn.dataset.period, 10);
        loadMetrics();
      });
    });
    // default selection
    periodToggle.querySelector('[data-period="24"]').classList.add('active');
  </script>
</body>
</html>
